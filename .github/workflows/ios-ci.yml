name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode and simulators
        run: |
          xcodebuild -version
          xcode-select -p
          xcrun simctl list devices available

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project OOChatIOS.xcodeproj \
            -scheme OOChatIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -derivedDataPath build/DerivedData
